mutation CreateInquiry($data: Inquiry_Data!) @auth(level: USER) {
  inquiry_insert(data: $data)
}

mutation UpdateInquiry($id: UUID!, $data: Inquiry_Data!) @auth(level: USER) {
  inquiry_update(id: $id, data: $data)
}

mutation DeleteInquiry($id: UUID!) @auth(level: USER) {
  inquiry_delete(id: $id)
}

query GetInquiry($id: UUID!) @auth(level: USER) {
  inquiry(id: $id) {
    status
    message
  }
}

query ListInquiries @auth(level: USER) {
  inquiries(where: { clientId: { eq_expr: "auth.uid" } }) {
    message
    status
  }
}

mutation CreateWatchlist($data: Watchlist_Data!) @auth(level: USER) {
