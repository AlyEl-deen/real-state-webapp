mutation UpdateWatchlist($id: UUID!, $data: Watchlist_Data!) @auth(level: USER) {
  watchlist_update(id: $id, data: $data)
}

mutation DeleteWatchlist($id: UUID!) @auth(level: USER) {
  watchlist_delete(id: $id)
}

query GetWatchlist($id: UUID!) @auth(level: USER) {
  watchlist(id: $id) {
