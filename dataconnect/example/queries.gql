mutation CreateUser($data: User_Data!) @auth(level: USER) {
  user_insert(data: $data)
}

mutation UpdateUser($id: UUID!, $data: User_Data!) @auth(level: USER) {
  user_update(id: $id, data: $data)
}

mutation DeleteUser($id: UUID!) @auth(level: USER) {
  user_delete(id: $id)
}

query GetUser($id: UUID!) @auth(level: USER) {
  user(id: $id) {
    name
    email
  }
}

query ListUsers @auth(level: USER) {
  users {
    name
  }
}

mutation CreateProperty($data: Property_Data!) @auth(level: USER) {
  property_insert(data: $data)
}

mutation UpdateProperty($id: UUID!, $data: Property_Data!) @auth(level: USER) {
  property_update(id: $id, data: $data)
}

mutation DeleteProperty($id: UUID!) @auth(level: USER) {
  property_delete(id: $id)
}

query GetProperty($id: UUID!) @auth(level: PUBLIC, insecureReason: "Property listings are public") {
  property(id: $id) {
    title
    price
  }
}

query ListProperties @auth(level: PUBLIC, insecureReason: "Property listings are public") {
  properties {
    title
    location
  }
}

